apiVersion: apps/v1
kind: ConfigMap
metadata:
  name: shipping
  namespace: roboshop
data:
  CART_ENDPOINT: cart:8080
  DB_HOST: mysql
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: roboshop
  labels:
    project: roboshop
    component: shipping
    environment: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      labels:
        project: roboshop
        component: shipping
        environment: dev
    template:
      metadata:
        name: shipping
        namespace: roboshop
      spec:
        containers:
        - name: shipping
          image: someshwarsangaraju/shipping:v1
          imagePullPolicy: Always
          envFrom:
          - configMapRef:
              name: shipping
        

---


apiVersion: v1
kind: Service
metadata:
  name: shipping
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: shipping
    environment: dev
  ports:
  - protocol: TCP
    port: 8080 
    targetPort: 8080 

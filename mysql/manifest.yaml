apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    component: mysql
    environment: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      project: roboshop
      component: mysql
      environment: dev
  template:
    metadata:
      name: mysql
      namespace: roboshop
      labels:
        project: roboshop
        component: mysql
        environment: dev
    spec:
      containers:
      - name: mysql
        image: someshwarsangaraju/mysql:v1
        imagePullPolicy: Always
        readinessProbe:
          tcpSocket:
            port: 6379 
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 6379 
          initialDelaySeconds: 5
          periodSeconds: 5
        # ports:
        # - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: mysql
    environment: dev
  ports:
  - protocol: TCP
    port: 6379 
    targetPort: 6379 


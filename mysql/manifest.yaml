apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql
  namespace: roboshop
data:
  my.cnf: |
    [mysqld]
    innodb_redo_log_capacity = 2G
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    component: mysql
    environment: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      project: roboshop
      component: mysql
      environment: dev
  template:
    metadata:
      name: mysql
      namespace: roboshop
      labels:
        project: roboshop
        component: mysql
        environment: dev
    spec:
      containers:
      - name: mysql
        image: someshwarsangaraju/mysql:v1
        imagePullPolicy: Always
        volumeMounts:
        - name: mysql-config
          mountPath: /etc/mysql/conf.d/my.cnf
          subPath: my.cnf
      volumes:
        - name: mysql-config
          configMap:
            name: mysql
       

---

apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: mysql
    environment: dev
  ports:
  - protocol: TCP
    port: 3306 
    targetPort: 3306 


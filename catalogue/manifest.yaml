apiVersion: apps/v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    component: catalogue
    environment: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      labels:
        project: roboshop
        component: catalogue
        environment: dev
    template:
      metadata:
        name: catalogue
        namespace: roboshop
      spec:
        containers:
        - name: catalogue
          image: someshwarsangaraju/catalogue:v1
          imagePullPolicy: Always
          envFrom:
          - configMapRef:
              name: catalogue


---


apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: catalogue
    environment: dev
  ports:
  - protocol: TCP
    port: 8080 
    targetPort: 8080 

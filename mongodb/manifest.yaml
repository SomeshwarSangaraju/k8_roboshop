apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    component: mongodb
    environment: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      project: roboshop
      component: mongodb
      environment: dev
  template:
    metadata:
      labels:
        project: roboshop
        component: mongodb
        environment: dev
    spec:
      containers:
      - name: mongodb
        image: someshwarsangaraju/mongodb:v1
        imagePullPolicy: Always
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 5
          periodSeconds: 5
        # ports:
        # - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: mongodb
    environment: dev
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017




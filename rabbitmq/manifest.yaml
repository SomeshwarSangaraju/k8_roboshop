apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    component: rabbitmq
    environment: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      project: roboshop
      component: rabbitmq
      environment: dev
  template:
    metadata:
      name: rabbitmq
      namespace: roboshop
      labels:
        project: roboshop
        component: rabbitmq
        environment: dev
    spec:
      containers:
      - name: rabbitmq
        image: someshwarsangaraju/rabbitmq:v1
        imagePullPolicy: Always
        readinessProbe:
          tcpSocket:
            port: 6379 
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 6379 
          initialDelaySeconds: 5
          periodSeconds: 5
        # ports:
        # - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: rabbitmq
    environment: dev
  ports:
  - protocol: TCP
    port: 6379 
    targetPort: 6379 


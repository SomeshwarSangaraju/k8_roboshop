apiVersion: apps/v1
kind: ConfigMap
metadata:
  name: payment
  namespace: roboshop
data:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  AMQP_HOST: "rabbitmq"
  AMQP_USER: "roboshop"
  AMQP_PASS: "roboshop123"
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    component: payment
    environment: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      labels:
        project: roboshop
        component: payment
        environment: dev
    template:
      metadata:
        name: payment
        namespace: roboshop
      spec:
        containers:
        - name: payment
          image: someshwarsangaraju/payment:v1
          imagePullPolicy: Always
          envFrom:
          - configMapRef:
              name: payment


---


apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: payment
    environment: dev
  ports:
  - protocol: TCP
    port: 8080 
    targetPort: 8080 

apiVersion: apps/v1
kind: ConfigMap
metadata:
  name: cart
  namespace: roboshop
data:
  REDIS_HOST="redis"
  CATALOGUE_HOST="catalogue"
  CATALOGUE_PORT="8080"
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    component: cart
    environment: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      labels:
        project: roboshop
        component: cart
        environment: dev
    template:
      metadata:
        name: cart
        namespace: roboshop
      spec:
        containers:
        - name: cart
          image: someshwarsangaraju/cart:v1
          imagePullPolicy: Always
          envFrom:
          - configMapRef:
              name: cart
        

---


apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: cart
    environment: dev
  ports:
  - protocol: TCP
    port: 8080 
    targetPort: 8080 
